<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parthib - Social Links</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: #333;
        }

        .profile-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 4px solid #74ebd5;
            object-fit: cover;
        }

        h2 { margin: 10px 0; color: #444; }

        .social-link {
            display: block;
            margin: 12px 0;
            padding: 12px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        .facebook { background-color: #4267B2; }
        .instagram { background-color: #C13584; }
        .linkedin { background-color: #0077b5; }
        .threads { background-color: #000000; }
        .gmail { background-color: #D44638; }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="https://i.ibb.co.com/N6QZR81Q/IMG-20260608-WA0009.jpg" alt="Parthib" class="profile-img">
        
        <h2>Parthib</h2>
        
        <a href="https://www.facebook.com/parthibdas2023" class="social-link facebook" target="_blank">Facebook</a>
        <a href="https://www.instagram.com/parthib_2023" class="social-link instagram" target="_blank">Instagram</a>
        <a href="https://www.linkedin.com/in/parthib-das" class="social-link linkedin" target="_blank">LinkedIn</a>
        <a href="https://www.threads.net/@parthib_2023" class="social-link threads" target="_blank">Threads</a>
        <a href="mailto:parthibdas.eco@gmail.com" class="social-link gmail">Gmail</a>
    </div>

</body>
</html>
